name: 3D Contribution Graph
on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:
  push:
    branches: [main]
jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: yoshi389111/github-profile-3d-contrib@0.7.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          USERNAME: ${{ github.repository_owner }}
      - name: Fix invalid XML entities in generated SVGs
        run: |
          find profile-3d-contrib -name '*.svg' -exec \
            perl -pi -e 's/&(?!amp;|lt;|gt;|quot;|apos;|#)/&amp;/g' {} \;
      - name: Commit to output branch
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add -f profile-3d-contrib/*.svg
          git commit -m "Update 3D contribution graph" || exit 0
          git subtree split --prefix profile-3d-contrib -b output
          git push -f origin output:output
